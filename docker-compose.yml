version: "3.8"
services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=https://expenses-turban-generous.ngrok-free.dev
    volumes:
      - n8n_data:/home/node/.n8n

  python-api:
    build: ./python-api
    ports:
      - "8000:8000"
    volumes:
      - ./pagos:/app/pagos

volumes:
  n8n_data: